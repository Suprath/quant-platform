services:
  # SHARED BASE IMAGE (Builds once, used by all Python services)
  base-python:
    build:
      context: ..
      dockerfile: Dockerfile.base
    image: kira-python-base
    # This service doesn't need to run, it just facilitates the build
    entrypoint: ["echo", "Base image built"]
    restart: "no"

  # LAYER 2: MESSAGE BUS (The "Heart" of the system)
  kafka:
    image: apache/kafka:latest
    container_name: kafka_bus
    ports:
      - "9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka_bus:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka_bus:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: always

  ingestor:
    build:
      context: ..
      dockerfile: services/ingestion/Dockerfile
    container_name: upstox_ingestor
    depends_on:
      - kafka # REMOVED: condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/kira-shared/src
    volumes:
      - ../services/ingestion:/app
      - ../kira-shared:/kira-shared
    env_file:
      - ../.env
    restart: always

  # LAYER 2: STATE STORE & CACHE
  redis:
    image: redis:7-alpine
    container_name: redis_state
    ports:
      - "6379:6379"
    restart: always

  # LAYER 3: TIME-SERIES STORAGE (Tick & OHLC Data)
  questdb:
    image: questdb/questdb:latest
    container_name: questdb_tsdb
    ports:
      - "9000:9000"
      - "8812:8812"
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      - QDB_PG_USER=${QUESTDB_USER}
      - QDB_PG_PASSWORD=${QUESTDB_PASSWORD}
    restart: always

  # LAYER 3: RELATIONAL STORAGE (Users & Strategies)
  postgres:
    image: postgres:15-alpine
    container_name: postgres_metadata
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # LAYER 3: OBJECT STORAGE (Strategy Code & Backtest results)
  minio:
    image: minio/minio:latest
    container_name: minio_s3
    command: server /data --console-address ":9001"
    ports:
      - "9005:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    restart: always

  persistor:
    build:
      context: ..
      dockerfile: services/persistor/Dockerfile
    container_name: market_persistor
    depends_on:
      - kafka
      - questdb
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ../.env
    restart: always

  feature_engine:
    build:
      context: ..
      dockerfile: services/feature_engine/Dockerfile
    container_name: feature_engine
    depends_on:
      - kafka
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/kira-shared/src
    env_file:
      - ../.env
    volumes:
      - ../services/feature_engine:/app
      - ../kira-shared:/kira-shared
    restart: always

  strategy_runtime:
    build:
      context: ..
      dockerfile: services/strategy_runtime/Dockerfile
    container_name: strategy_runtime
    depends_on:
      - kafka
      - postgres
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONOPTIMIZE=1 # Disable debug assertions for speed
      - KIRA_CPP_ENGINE=${KIRA_CPP_ENGINE:-true}
      - PYTHONPATH=/app:/kira-shared/src:/position_sizer:/noise_filter:/kira_til
    env_file:
      - ../.env
    volumes:
      - ../services/strategy_runtime:/app
      - ../strategies:/app/strategies
      - ../tests:/app/tests
      - ../kira-shared:/kira-shared
      - ../services/position_sizer/src:/position_sizer
      - ../services/noise_filter/src:/noise_filter
      - ../services/kira_til/src:/kira_til
    restart: always
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G

  api_gateway:
    build:
      context: ..
      dockerfile: services/api_gateway/Dockerfile
    container_name: api_gateway
    volumes:
      - ../services/api_gateway:/app
      - ../.env:/app/.env:ro
      - ../kira-shared:/kira-shared
    environment:
      - PYTHONPATH=/app:/kira-shared/src
    depends_on:
      - postgres
      - questdb
    ports:
      - "8080:8000"
    restart: always

  backfiller:
    build:
      context: ..
      dockerfile: services/backfiller/Dockerfile
    container_name: data_backfiller
    depends_on:
      - questdb
      - postgres
    env_file:
      - ../.env
    ports:
      - "8001:8001"

  edge_detector:
    build:
      context: ..
      dockerfile: services/edge_detector/Dockerfile
    container_name: edge_detector
    depends_on:
      - questdb
    env_file:
      - ../.env
    ports:
      - "8002:8002"
    volumes:
      - ../services/edge_detector:/app
    restart: always

  scanner:
    build:
      context: ..
      dockerfile: services/scanner/Dockerfile
    container_name: market_scanner
    command: python main.py --live
    depends_on:
      - kafka
      - postgres
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/kira-shared/src
    env_file:
      - ../.env
    volumes:
      - ../services/scanner:/app
      - ../kira-shared:/kira-shared
    restart: always

  optimizer:
    build:
      context: ..
      dockerfile: services/optimizer/Dockerfile
    container_name: param_optimizer
    depends_on:
      - postgres
      - questdb
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=postgres_metadata
      - QUESTDB_URL=http://questdb_tsdb:9000
    volumes:
      - ../services/optimizer:/app
    profiles: [ "optimize" ] # Only start when explicitly requested

  doctor:
    build:
      context: ..
      dockerfile: services/system_doctor/Dockerfile
    container_name: system_doctor
    depends_on:
      - postgres
      - questdb
      - kafka
      - api_gateway

  historical_replayer:
    build:
      context: ..
      dockerfile: services/historical_replayer/Dockerfile
    container_name: historical_replayer
    depends_on:
      - kafka
      - questdb
    env_file:
      - ../.env
    volumes:
      - ../services/historical_replayer:/app
      - ../kira-shared:/kira-shared
    environment:
      - PYTHONPATH=/app:/kira-shared/src
    profiles: [ "replay" ] # Only start when explicitly requested

  frontend:
    build: ../frontend
    container_name: quant_frontend
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - API_INTERNAL_URL=http://api_gateway:8000
    depends_on:
      - api_gateway
    restart: always

  mcp_server:
    build:
      context: ..
      dockerfile: services/mcp_server/Dockerfile
    container_name: mcp_server
    depends_on:
      - api_gateway
    ports:
      - "8005:8080"
    volumes:
      - ../services/mcp_server:/app
      - ../kira-shared:/kira-shared
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app:/kira-shared/src
    restart: always

  noise_filter:
    build: 
      context: ..
      dockerfile: services/noise_filter/Dockerfile
    container_name: noise_filter
    depends_on:
      - kafka
      - redis
    env_file:
      - ../.env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka_bus:9092
      - REDIS_HOST=redis_state
      - PYTHONPATH=/app:/kira-shared/src
    volumes:
      - ../services/noise_filter:/app
      - ../kira-shared:/kira-shared
    restart: always

  position_sizer:
    build:
      context: ..
      dockerfile: services/position_sizer/Dockerfile
    container_name: position_sizer
    depends_on:
      - kafka
      - redis
    env_file:
      - ../.env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka_bus:9092
      - REDIS_HOST=redis_state
      - PYTHONPATH=/app:/kira-shared/src
    volumes:
      - ../services/position_sizer:/app
      - ../kira-shared:/kira-shared
    restart: always

  kira_til:
    build:
      context: ..
      dockerfile: services/kira_til/Dockerfile
    container_name: kira_til
    depends_on:
      - kafka
      - redis
      - postgres
    env_file:
      - ../.env
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka_bus:9092
      - REDIS_HOST=redis_state
      - POSTGRES_HOST=postgres_metadata
      - TIL_BACKTEST_MODE=true
      - PYTHONPATH=/app:/app/src:/kira-shared/src
    volumes:
      - ../services/kira_til/src:/app/src
      - ../kira-shared:/kira-shared
    ports:
      - "8003:8000"
    restart: always

volumes:
  questdb_data:
  postgres_data:
  minio_data:
  kafka_data:


